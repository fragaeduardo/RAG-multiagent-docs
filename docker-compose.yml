services:
  rag_etl_app:
    build: .
    container_name: rag_etl_app
    depends_on:
      - qdrant
    volumes:
      # Montagem local para refletir códigos instantaneamente e persistir dados baixados
      - .:/app
    # Executa o contêiner com as mesmas permissões do usuário host para evitar erro de EACCES no root
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/models/hf_cache
      - QDRANT_URL=http://qdrant:6333
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Mantém o container vivo para receber comandos via exec
    command: tail -f /dev/null

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      # Porta 6334 no host → 6333 no container (evita conflito com outros projetos usando 6333)
      - "6334:6333"
    volumes:
      - ./data/qdrant_server_storage:/qdrant/storage
